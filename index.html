<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luminova Portfolio & CMS</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { gold: '#D4AF37' },
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        playfair: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- React, ReactDOM, Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 1. استدعاء ملف البيانات الخارجي مع كسر الكاش (مرة واحدة فقط عند فتح الصفحة) -->
    <script>
        // Cache-Busting آمن: يعمل لمرة واحدة فقط عند فتح الصفحة.
        // يستخدم document.write لضمان التحميل المتزامن (Blocking) قبل React.
        // ممنوع منعاً باتاً: setInterval / setTimeout / location.reload
        document.write('<script src="data.js?v=' + Date.now() + '"><\/script>');
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        .en-font { font-family: 'Playfair Display', serif; }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-wrapper { transition: transform 0.1s ease; }
        .card-flipper { transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.8); }

        @keyframes fadeIn { to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        .accordion-content { transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Sun: <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
                Moon: <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,
                Globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                Search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
                Menu: <><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>,
                X: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                ChevronDown: <polyline points="6 9 12 15 18 9"/>,
                ChevronUp: <polyline points="18 15 12 9 6 15"/>,
                ExternalLink: <><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                Facebook: <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>,
                Instagram: <><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></>,
                Linkedin: <><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></>,
                Lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                FileJson: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M10 12a2 2 0 0 0-2 2v1a2 2 0 0 1-2 2 2 2 0 0 1 2 2v1a2 2 0 0 0 2 2M14 12a2 2 0 0 1 2 2v1a2 2 0 0 0 2 2 2 2 0 0 0-2 2v1a2 2 0 0 1-2 2"/></>,
                Trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                Info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
                Link: <><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- 2. إزالة البيانات الثابتة (Failsafe Empty Structure) ---
        const emptyData = { news: [], projects: [] };

        // Smart Logic: Auto Logo Fetching by AI-like domain detection
        const getSmartLogoUrl = (projectUrl) => {
            if (!projectUrl) return 'img/logo.png';
            try {
                const domain = new URL(projectUrl).hostname;
                return `https://icon.horse/icon/${domain}`;
            } catch (error) {
                return 'img/logo.png';
            }
        };

        const ReadMore = ({ text, maxLength = 100, t }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            if (!text) return null;
            if (text.length <= maxLength) return <span className="leading-relaxed">{text}</span>;
            return (
                <span className="leading-relaxed">
                    {isExpanded ? text : `${text.substring(0, maxLength)}... `}
                    <button onClick={() => setIsExpanded(!isExpanded)} className="text-gold font-bold ms-1 hover:text-amber-600 focus:outline-none transition-colors inline-block">
                        {isExpanded ? t('showLess') : t('showMore')}
                    </button>
                </span>
            );
        };

        const SmartEmbed = ({ url, t }) => {
            const [imgFailed, setImgFailed] = useState(false);
            useEffect(() => { setImgFailed(false); }, [url]);
            if (!url) return null;
            const isExplicitImage = url.match(/\.(jpeg|jpg|gif|png|webp|svg|bmp)(?:\?.*)?$/i) || url.match(/^data:image\//);
            if (url.match(/\.(mp4|webm|ogg)(?:\?.*)?$/i)) {
                return (
                    <div className="rounded-xl overflow-hidden mt-4 shadow-md bg-black w-full flex justify-center">
                        <video controls className="w-full max-h-[450px] object-contain"><source src={url} /></video>
                    </div>
                );
            }
            const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
            if (ytMatch) {
                return (
                    <div className="rounded-xl overflow-hidden mt-4 border border-slate-200 dark:border-slate-700 relative w-full pt-[56.25%] shadow-md bg-black">
                        <iframe className="absolute top-0 left-0 w-full h-full" src={`https://www.youtube.com/embed/${ytMatch[1]}`} frameBorder="0" allowFullScreen></iframe>
                    </div>
                );
            }
            if (url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/i)) {
                const driveId = url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/i)[1];
                return (
                    <div className="rounded-xl overflow-hidden mt-4 border border-slate-200 dark:border-slate-700 relative w-full pt-[56.25%] shadow-md bg-slate-100 dark:bg-slate-800">
                        <iframe className="absolute top-0 left-0 w-full h-full" src={`https://drive.google.com/file/d/${driveId}/preview`} allow="autoplay"></iframe>
                    </div>
                );
            }
            if (!imgFailed) {
                return (
                    <div className="relative rounded-2xl overflow-hidden mt-6 shadow-lg group isolate cursor-zoom-in border border-slate-200/50 dark:border-slate-700/50" onClick={() => window.open(url, '_blank')}>
                        <div className="absolute inset-0 z-0 opacity-50 dark:opacity-40 blur-2xl scale-125 bg-cover bg-center transition-opacity duration-500" style={{ backgroundImage: `url(${url})` }}></div>
                        <div className="absolute inset-0 z-10 bg-white/10 dark:bg-black/20 backdrop-blur-sm"></div>
                        <div className="relative z-20 w-full flex justify-center p-2">
                            <img src={url} alt="News content" className="max-w-full h-auto max-h-[500px] object-contain rounded-xl shadow-2xl transition-transform duration-700 group-hover:scale-105" loading="lazy" onError={() => !isExplicitImage && setImgFailed(true)} />
                        </div>
                    </div>
                );
            }
            return (
                <a href={url} target="_blank" rel="noopener noreferrer" className="mt-4 flex items-center p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 hover:bg-gold/10 hover:border-gold/50 transition-all duration-300 group shadow-sm hover:shadow-md">
                    <div className="flex-shrink-0 w-12 h-12 rounded-full bg-gold/20 flex items-center justify-center text-gold group-hover:bg-gold group-hover:text-white transition-colors duration-300"><Icon name="Link" size={24} /></div>
                    <div className="ms-4 flex-grow overflow-hidden">
                        <h4 className="font-bold text-slate-900 dark:text-white truncate group-hover:text-gold transition-colors">{t('visitLink')}</h4>
                        <p className="text-sm text-slate-500 dark:text-slate-400 truncate mt-0.5">{url}</p>
                    </div>
                    <div className="flex-shrink-0 ms-2 text-slate-400 group-hover:text-gold transform group-hover:-translate-y-1 group-hover:translate-x-1 rtl:group-hover:-translate-x-1 transition-all duration-300"><Icon name="ExternalLink" size={20} /></div>
                </a>
            );
        };

        const dict = {
            ar: {
                brand: 'Luminova', home: 'الرئيسية', projects: 'مواقعنا', about: 'من نحن', search: 'بحث عن مشروع أو خبر...', noResults: 'لا توجد نتائج مطابقة لبحثك.', showMore: 'عرض المزيد', showLess: 'عرض أقل', visitSite: 'تصفح الموقع', visitLink: 'زيارة الرابط / تصفح المحتوى', downloadCV: 'تحميل السيرة الذاتية', name: 'محمود عبد الرحمن عبد الله', title: 'تخصص تكنولوجيا التعليم - جامعة حلوان', newsTitle: 'آخر الأخبار والتحديثات', projectExplanation: 'شرح الموقع', adminLogin: 'تسجيل الدخول للوحة التحكم', password: 'كلمة المرور', login: 'دخول', adminDashboard: 'لوحة التحكم (Luminova CMS)', addNews: 'إضافة خبر', addProject: 'إضافة مشروع', exportData: 'سحب الكود (Export)', save: 'حفظ', update: 'تحديث البيانات', cancel: 'إلغاء التعديل', logout: 'خروج', copied: 'تم النسخ بنجاح!', confirmDelete: 'هل أنت متأكد من حذف هذا العنصر؟', adminNewsTextAr: 'نص الخبر (عربي)', adminNewsTextEn: 'نص الخبر (إنجليزي)', adminLinkInfo: 'الرابط (صورة، يوتيوب، درايف، فيميو، فيديو مباشر، أو رابط عام)', adminProjNameAr: 'اسم المشروع (عربي)', adminProjNameEn: 'اسم المشروع (إنجليزي)', adminProjUrl: 'رابط الموقع الفعلي', adminProjImg: 'رابط اللوجو (يفضل صورة شفافة)', adminProjShortAr: 'النبذة التعريفية (عربي)', adminProjShortEn: 'النبذة التعريفية (إنجليزي)', adminProjLongAr: 'الشرح التفصيلي (عربي) - اختياري', adminProjLongEn: 'الشرح التفصيلي (إنجليزي) - اختياري', adminProjEmbed: 'رابط شرح إضافي (ميديا/يوتيوب/درايف) - اختياري'
            },
            en: {
                brand: 'Luminova', home: 'Home', projects: 'Our Projects', about: 'About Us', search: 'Search for projects or news...', noResults: 'No results found matching your search.', showMore: 'Show More', showLess: 'Show Less', visitSite: 'Visit Site', visitLink: 'Visit Link / View Content', downloadCV: 'Download CV', name: 'Mahmoud Abdel Rahman Abdallah', title: 'Educational Technology - Helwan University', newsTitle: 'Latest News & Updates', projectExplanation: 'Project Explanation', adminLogin: 'Admin Login', password: 'Password', login: 'Login', adminDashboard: 'Dashboard (Luminova CMS)', addNews: 'Add News', addProject: 'Add Project', exportData: 'Export Data', save: 'Save', update: 'Update Data', cancel: 'Cancel Edit', logout: 'Logout', copied: 'Copied Successfully!', confirmDelete: 'Are you sure you want to delete this item?', adminNewsTextAr: 'News Text (Arabic)', adminNewsTextEn: 'News Text (English)', adminLinkInfo: 'Link (Image, YouTube, Drive, Vimeo, Video, or General URL)', adminProjNameAr: 'Project Name (Arabic)', adminProjNameEn: 'Project Name (English)', adminProjUrl: 'Actual Project URL', adminProjImg: 'Logo URL (Transparent preferred)', adminProjShortAr: 'Short Description (Arabic)', adminProjShortEn: 'Short Description (English)', adminProjLongAr: 'Detailed Explanation (Arabic) - Optional', adminProjLongEn: 'Detailed Explanation (English) - Optional', adminProjEmbed: 'Extra Explanatory Link (Media/YouTube/Drive) - Optional'
            }
        };

        const App = () => {
            const [lang, setLang] = useState('ar');
            const [theme, setTheme] = useState('dark');
            const [activeTab, setActiveTab] = useState('home'); 
            const [searchQuery, setSearchQuery] = useState('');
            const [isLoaderVisible, setIsLoaderVisible] = useState(true);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // 3. قراءة البيانات — window.initialData (من data.js الجديد) له الأولوية القصوى دائماً
            const [data, setData] = useState(() => {
                // ✅ الأولوية: data.js المُحدَّث من السيرفر يفوز دائماً على localStorage
                if (typeof window !== 'undefined' && window.initialData) {
                    localStorage.setItem('luminova_data_v6', JSON.stringify(window.initialData));
                    return window.initialData;
                }
                // احتياطي: إذا لم يكن data.js موجوداً (حالة نادرة جداً)
                const saved = localStorage.getItem('luminova_data_v6');
                if (saved) return JSON.parse(saved);
                return emptyData;
            });

            const clickData = useRef({ count: 0, lastTime: 0 });
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');

            const handleLogoClick = (e) => {
                e.preventDefault();
                const now = Date.now();
                if (now - clickData.current.lastTime > 2000) clickData.current.count = 1;
                else clickData.current.count += 1;
                clickData.current.lastTime = now;
                if (clickData.current.count >= 5) {
                    setShowAdminLogin(true);
                    clickData.current.count = 0;
                } else if (clickData.current.count === 1) setActiveTab('home');
            };

            const t = (key) => dict[lang][key] || key;

            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [theme]);

            useEffect(() => {
                document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = lang;
            }, [lang]);

            useEffect(() => {
                localStorage.setItem('luminova_data_v6', JSON.stringify(data));
            }, [data]);

            useEffect(() => {
                const timer = setTimeout(() => setIsLoaderVisible(false), 2000);
                return () => clearTimeout(timer);
            }, []);

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === 'admin') {
                    setIsAdminAuth(true);
                    setShowAdminLogin(false);
                    setActiveTab('admin');
                    setAdminPassword('');
                } else alert(lang === 'ar' ? 'كلمة المرور خاطئة' : 'Incorrect Password');
            };

            const filteredProjects = data.projects.filter(p => p.name[lang].toLowerCase().includes(searchQuery.toLowerCase()) || p.shortDesc[lang].toLowerCase().includes(searchQuery.toLowerCase()));
            const filteredNews = data.news.filter(n => n.text[lang].toLowerCase().includes(searchQuery.toLowerCase()));

            if (isLoaderVisible) {
                return (
                    <div className="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 transition-colors duration-500">
                        <div className="relative w-24 h-24 animate-pulse">
                            <div className="absolute inset-0 border-4 border-[#D4AF37] rounded-xl rotate-45 animate-[spin_4s_linear_infinite]" />
                            <div className="absolute inset-2 border-4 border-amber-600 rounded-full animate-[ping_2s_cubic-bezier(0,0,0.2,1)_infinite]" />
                            <div className="absolute inset-0 flex items-center justify-center font-bold text-3xl text-[#D4AF37] en-font">L</div>
                        </div>
                        <h1 className="mt-8 text-2xl tracking-widest font-light text-slate-800 dark:text-slate-200 en-font">LUMINOVA</h1>
                    </div>
                );
            }

            return (
                <div className={`relative ${lang === 'en' ? 'en-font' : ''}`}>
                    <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none">
                        <div className="absolute top-[-10%] rtl:right-[-10%] ltr:left-[-10%] w-[40%] h-[40%] rounded-full bg-yellow-500/10 dark:bg-yellow-500/5 blur-[100px]" />
                        <div className="absolute bottom-[-10%] rtl:left-[-10%] ltr:right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-500/10 dark:bg-blue-500/5 blur-[100px]" />
                    </div>
                    <nav className="sticky top-0 z-50 w-full glass transition-all duration-300">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <div className="flex-shrink-0 flex items-center cursor-pointer group select-none" onClick={handleLogoClick} style={{ touchAction: 'manipulation' }}>
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-gold to-yellow-600 flex items-center justify-center text-white font-bold text-xl shadow-lg group-hover:shadow-gold/50 transition-all duration-300 transform group-active:scale-95">L</div>
                                    <span className="ms-3 text-2xl font-bold tracking-wider text-slate-900 dark:text-white en-font">Luminova</span>
                                </div>
                                <div className="hidden md:flex items-center space-x-8 rtl:space-x-reverse">
                                    {['home', 'projects', 'about'].map((tab) => (
                                        <button key={tab} onClick={() => setActiveTab(tab)} className={`text-lg transition-colors duration-300 relative ${activeTab === tab ? 'text-gold font-bold' : 'text-slate-600 dark:text-slate-300 hover:text-gold dark:hover:text-gold'}`}>
                                            {t(tab)}
                                            {activeTab === tab && <span className="absolute -bottom-2 left-0 w-full h-1 bg-gold rounded-t-md" />}
                                        </button>
                                    ))}
                                </div>
                                <div className="hidden md:flex items-center space-x-4 rtl:space-x-reverse">
                                    <div className="relative group">
                                        <input type="text" placeholder={t('search')} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-0 opacity-0 group-hover:w-64 group-hover:opacity-100 focus:w-64 focus:opacity-100 transition-all duration-500 ease-in-out bg-white/40 dark:bg-black/40 border border-slate-300 dark:border-slate-600 rounded-full py-2 px-4 pe-10 focus:outline-none focus:border-gold backdrop-blur-sm" />
                                        <button className="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-500 hover:text-gold dark:text-slate-400 dark:hover:text-gold transition-colors"><Icon name="Search" size={20} /></button>
                                    </div>
                                    <button onClick={() => setLang(lang === 'ar' ? 'en' : 'ar')} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors flex items-center justify-center text-slate-700 dark:text-slate-200"><Icon name="Globe" size={20} /><span className="ms-1 text-sm font-bold">{lang === 'ar' ? 'EN' : 'AR'}</span></button>
                                    <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-200">{theme === 'dark' ? <Icon name="Sun" size={20} className="text-yellow-400" /> : <Icon name="Moon" size={20} />}</button>
                                </div>
                                <div className="md:hidden flex items-center space-x-2 rtl:space-x-reverse">
                                    <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 text-slate-700 dark:text-slate-200">{theme === 'dark' ? <Icon name="Sun" size={20} className="text-yellow-400" /> : <Icon name="Moon" size={20} />}</button>
                                    <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 text-slate-700 dark:text-slate-200">{isMobileMenuOpen ? <Icon name="X" size={28} /> : <Icon name="Menu" size={28} />}</button>
                                </div>
                            </div>
                        </div>
                        {isMobileMenuOpen && (
                            <div className="md:hidden glass border-t border-slate-200 dark:border-slate-800 animate-fade-in">
                                <div className="px-4 pt-4 pb-6 space-y-3">
                                    <input type="text" placeholder={t('search')} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-white/40 dark:bg-black/40 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 focus:outline-none focus:border-gold text-slate-900 dark:text-white" />
                                    {['home', 'projects', 'about'].map((tab) => (
                                        <button key={tab} onClick={() => { setActiveTab(tab); setIsMobileMenuOpen(false); }} className="block w-full text-start px-3 py-2 rounded-md text-base font-bold text-slate-800 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-800">{t(tab)}</button>
                                    ))}
                                    <button onClick={() => { setLang(lang === 'ar' ? 'en' : 'ar'); setIsMobileMenuOpen(false); }} className="block w-full text-start px-3 py-2 rounded-md text-base font-bold text-slate-800 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-800"><Icon name="Globe" size={18} className="inline me-2"/>{lang === 'ar' ? 'English' : 'العربية'}</button>
                                </div>
                            </div>
                        )}
                    </nav>
                    <main className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 min-h-[calc(100vh-80px)]">
                        {searchQuery && (filteredProjects.length === 0 && filteredNews.length === 0) && (
                            <div className="text-center py-10 glass-card rounded-2xl mb-8 animate-fade-in">
                                <Icon name="Search" size={48} className="mx-auto text-slate-400 mb-4 opacity-50" /><p className="text-xl text-slate-600 dark:text-slate-400">{t('noResults')}</p>
                            </div>
                        )}
                        {activeTab === 'home' && (
                            <div className="space-y-12 animate-fade-in">
                                <div className="text-center mb-16">
                                    <h1 className="text-5xl md:text-7xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-gold to-amber-500 en-font tracking-wider">{t('brand')}</h1>
                                    <p className="text-xl text-slate-600 dark:text-slate-400 font-semibold">{t('newsTitle')}</p>
                                </div>
                                <div className="relative border-s-4 border-gold/30 ms-4 md:ms-8 space-y-12 pb-10">
                                    {filteredNews.map((item) => (
                                        <div key={item.id} className="relative ps-8 md:ps-12 group">
                                            <div className="absolute w-6 h-6 bg-gold rounded-full -start-[15px] top-6 border-4 border-slate-50 dark:border-slate-900 shadow-lg group-hover:scale-125 transition-transform duration-300" />
                                            <div className="glass-card rounded-2xl p-6 md:p-8 hover:-translate-y-1 transition-transform duration-300">
                                                <div className="flex items-center space-x-4 rtl:space-x-reverse mb-4">
                                                    <img src="img/profile.png" alt="Author" className="w-12 h-12 rounded-full object-cover border-2 border-gold shadow-md" />
                                                    <div><h3 className="font-bold text-lg text-slate-900 dark:text-white">{t('name')}</h3><span className="text-sm text-slate-500 dark:text-slate-400 font-mono">{item.date}</span></div>
                                                </div>
                                                <div className="text-lg text-slate-800 dark:text-slate-200"><ReadMore text={item.text[lang]} maxLength={120} t={t} /></div>
                                                <SmartEmbed url={item.embedUrl} t={t} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === 'projects' && (
                            <div className="animate-fade-in pb-10">
                                <h2 className="text-3xl font-bold mb-10 text-center text-slate-900 dark:text-white">{t('projects')}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 items-start">{filteredProjects.map(project => <ProjectCard key={project.id} project={project} t={t} lang={lang} />)}</div>
                            </div>
                        )}
                        {activeTab === 'about' && (
                            <div className="flex justify-center items-center py-10 animate-fade-in"><AboutCard t={t} lang={lang} /></div>
                        )}
                        {activeTab === 'admin' && isAdminAuth && (
                            <AdminDashboard data={data} setData={setData} t={t} lang={lang} onLogout={() => { setIsAdminAuth(false); setActiveTab('home'); }} />
                        )}
                    </main>
                    {showAdminLogin && !isAdminAuth && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-md px-4">
                            <div className="glass-card w-full max-w-md p-8 rounded-2xl relative animate-fade-in border border-gold/30">
                                <button onClick={() => setShowAdminLogin(false)} className="absolute top-4 right-4 rtl:left-4 rtl:right-auto text-slate-500 hover:text-red-500 transition-colors"><Icon name="X" size={24} /></button>
                                <div className="text-center mb-6"><Icon name="Lock" size={48} className="mx-auto text-gold mb-3 drop-shadow-lg" /><h2 className="text-2xl font-bold text-slate-900 dark:text-white">{t('adminLogin')}</h2></div>
                                <form onSubmit={handleAdminLogin} className="space-y-4">
                                    <input type="password" placeholder={t('password')} value={adminPassword} onChange={(e) => setAdminPassword(e.target.value)} className="w-full bg-white/60 dark:bg-black/60 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold text-center text-2xl tracking-widest text-slate-900 dark:text-white transition-all" autoFocus />
                                    <button type="submit" className="w-full bg-gradient-to-r from-gold to-yellow-600 hover:from-yellow-500 hover:to-yellow-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-gold/50 transition-all transform hover:-translate-y-1">{t('login')}</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ProjectCard = ({ project, t, lang }) => {
            const [showExplanation, setShowExplanation] = useState(false);
            
            // Smart Logic: Fetch logo directly from target link or use default if imgUrl is empty
            const displayImg = project.imgUrl || getSmartLogoUrl(project.url);
            const hasExplanation = (project.longDesc && project.longDesc[lang]) || project.embedUrl;
            return (
                <div className="glass-card rounded-2xl flex flex-col border border-slate-200/50 dark:border-slate-700/50 transition-all duration-300 hover:shadow-xl hover:shadow-gold/15 overflow-hidden h-full">
                    <div className="pt-6 px-6 flex flex-col items-center bg-white/30 dark:bg-slate-800/30 border-b border-slate-200/50 dark:border-slate-700/50 pb-4 group cursor-pointer" onClick={() => window.open(project.url, '_blank')}>
                        <div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-white/50 dark:bg-slate-900/60 backdrop-blur-md border border-white/40 dark:border-gold/30 shadow-[0_0_20px_rgba(212,175,55,0.2)] dark:shadow-[0_0_25px_rgba(212,175,55,0.4)] flex items-center justify-center mb-5 p-3 relative group-hover:shadow-[0_0_30px_rgba(212,175,55,0.4)] dark:group-hover:shadow-[0_0_35px_rgba(212,175,55,0.7)] transition-shadow duration-500 overflow-hidden"><img src={displayImg} alt={project.name[lang]} className="w-full h-full object-contain drop-shadow-md transform group-hover:scale-110 transition-transform duration-500" /></div>
                        <h3 className="text-xl font-bold text-slate-900 dark:text-white text-center w-full mb-3 group-hover:text-gold transition-colors duration-300">{project.name[lang]}</h3>
                        <div className="inline-flex items-center text-gold font-bold text-sm bg-gold/10 px-4 py-1.5 rounded-full group-hover:bg-gold group-hover:text-white transition-all duration-300">{t('visitSite')}<Icon name="ExternalLink" size={16} className="ms-2" /></div>
                    </div>
                    <div className="pt-5 pb-5 px-6 flex-grow flex flex-col bg-white/40 dark:bg-slate-900/40">{project.shortDesc[lang] && <div className="text-slate-600 dark:text-slate-300 text-sm flex-grow"><ReadMore text={project.shortDesc[lang]} maxLength={90} t={t} /></div>}</div>
                    {hasExplanation && (
                        <div className="border-t border-slate-200 dark:border-slate-700 bg-white/20 dark:bg-black/20 mt-auto">
                            <button onClick={() => setShowExplanation(!showExplanation)} className="w-full flex items-center justify-center space-x-2 rtl:space-x-reverse text-slate-700 dark:text-slate-300 font-bold py-3 hover:bg-gold/10 hover:text-gold transition-colors focus:outline-none"><Icon name="Info" size={18}/><span>{t('projectExplanation')}</span>{showExplanation ? <Icon name="ChevronUp" size={18}/> : <Icon name="ChevronDown" size={18}/>}</button>
                            <div className={`accordion-content overflow-hidden px-4 ${showExplanation ? 'max-h-[2000px] opacity-100 pb-4' : 'max-h-0 opacity-0 pb-0'}`}>{project.longDesc[lang] && <div className="text-sm text-slate-700 dark:text-slate-300 p-4 bg-white/50 dark:bg-slate-800/50 rounded-xl mt-2 border border-slate-100 dark:border-slate-700 shadow-inner"><ReadMore text={project.longDesc[lang]} maxLength={150} t={t} /></div>}<SmartEmbed url={project.embedUrl} t={t} /></div>
                        </div>
                    )}
                </div>
            );
        };

        const AboutCard = ({ t, lang }) => {
            const cardRef = useRef(null);
            const [isFlipped, setIsFlipped] = useState(false);
            const handleMouseMove = (e) => {
                if (isFlipped || !cardRef.current) return;
                const el = cardRef.current;
                const rect = el.getBoundingClientRect();
                const rotateX = ((e.clientY - rect.top - (rect.height / 2)) / (rect.height / 2)) * -10;
                const rotateY = ((e.clientX - rect.left - (rect.width / 2)) / (rect.width / 2)) * 10;
                el.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            };
            return (
                <div className="perspective-1000 w-full max-w-md h-[450px] cursor-pointer group">
                    <div ref={cardRef} className={`card-wrapper relative w-full h-full transform-style-3d card-flipper ${isFlipped ? 'rotate-y-180' : ''}`} onMouseMove={handleMouseMove} onMouseLeave={() => cardRef.current.style.transform = `rotateX(0deg) rotateY(0deg)`} onClick={() => setIsFlipped(!isFlipped)}>
                        <div className="absolute inset-0 backface-hidden glass-card rounded-3xl overflow-hidden flex flex-col items-center justify-center p-8 shadow-[0_20px_50px_rgba(0,0,0,0.1)] dark:shadow-[0_20px_50px_rgba(212,175,55,0.05)] border border-white/40 dark:border-white/10 group-hover:shadow-gold/20 transition-shadow duration-500">
                            <div className="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-gold mb-4 shadow-xl relative flex-shrink-0"><img src="img/profile.png" alt="Profile" className="w-full h-full object-cover" /></div>
                            <h2 className="text-2xl font-bold text-center mb-1 bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400">{t('name')}</h2>
                            <p className="text-center text-gold font-bold text-sm px-4 leading-relaxed mb-6">{t('title')}</p>
                            <div className="flex space-x-6 rtl:space-x-reverse mb-6">
                                <a href="https://www.facebook.com/mahmoud.abdalrahaman.hagag" onClick={(e) => e.stopPropagation()} className="p-3 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-[#1877F2] hover:text-white transition-all duration-300 transform hover:scale-110 shadow-md"><Icon name="Facebook" size={24} /></a>
                                <a href="https://www.instagram.com/mahmoud_abdelrhman_1" onClick={(e) => e.stopPropagation()} className="p-3 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-[#E4405F] hover:text-white transition-all duration-300 transform hover:scale-110 shadow-md"><Icon name="Instagram" size={24} /></a>
                                <a href="https://www.linkedin.com/in/mahmoud-hagag-145127346/" onClick={(e) => e.stopPropagation()} className="p-3 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-[#0A66C2] hover:text-white transition-all duration-300 transform hover:scale-110 shadow-md"><Icon name="Linkedin" size={24} /></a>
                            </div>
                            <p className="absolute bottom-4 text-xs text-slate-400 animate-pulse font-mono tracking-widest">CLICK TO FLIP</p>
                        </div>
                        <div className="absolute inset-0 backface-hidden rotate-y-180 glass-card rounded-3xl p-8 flex flex-col items-center justify-center shadow-[0_20px_50px_rgba(0,0,0,0.2)] border border-white/40 dark:border-white/10">
                            <h3 className="text-3xl font-extrabold text-gold mb-8 en-font tracking-widest drop-shadow-md">{t('brand')}</h3>
                            <p className="text-center text-slate-700 dark:text-slate-300 mb-10 leading-relaxed font-semibold">{lang === 'ar' ? 'قم بتحميل السيرة الذاتية لمعرفة المزيد عن الخبرات والمهارات وتفاصيل المشاريع.' : 'Download the CV to learn more about experiences, skills, and project details.'}</p>
                            <button onClick={(e) => { e.stopPropagation(); alert('Downloading CV...'); }} className="w-full py-4 px-6 rounded-xl bg-gradient-to-r from-gold to-amber-600 hover:from-amber-600 hover:to-gold text-white font-bold flex items-center justify-center space-x-2 rtl:space-x-reverse shadow-lg transform hover:-translate-y-1 transition-all"><Icon name="Download" size={20} /><span>{t('downloadCV')}</span></button>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({ data, setData, t, lang, onLogout }) => {
            const [activeAdminTab, setActiveAdminTab] = useState('news');
            const [copied, setCopied] = useState(false);
            const [editingNewsId, setEditingNewsId] = useState(null);
            const [editingProjId, setEditingProjId] = useState(null);
            const [newsForm, setNewsForm] = useState({ textAr: '', textEn: '', embedUrl: '' });
            const [projForm, setProjForm] = useState({ nameAr: '', nameEn: '', url: '', imgUrl: '', shortAr: '', shortEn: '', longAr: '', longEn: '', embedUrl: '' });

            const handleSaveNews = () => {
                if(!newsForm.textAr) return;
                if (editingNewsId) {
                    setData(prev => ({ ...prev, news: prev.news.map(n => n.id === editingNewsId ? { ...n, text: { ar: newsForm.textAr, en: newsForm.textEn || newsForm.textAr }, embedUrl: newsForm.embedUrl } : n) }));
                    setEditingNewsId(null);
                } else {
                    const newEntry = { id: Date.now(), date: new Date().toISOString().split('T')[0], text: { ar: newsForm.textAr, en: newsForm.textEn || newsForm.textAr }, embedUrl: newsForm.embedUrl };
                    setData(prev => ({ ...prev, news: [newEntry, ...prev.news] }));
                }
                setNewsForm({ textAr: '', textEn: '', embedUrl: '' });
            };

            const handleEditNews = (item) => { setNewsForm({ textAr: item.text.ar, textEn: item.text.en, embedUrl: item.embedUrl || '' }); setEditingNewsId(item.id); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            const handleSaveProject = () => {
                if(!projForm.nameAr) return;
                const finalImgUrl = projForm.imgUrl.trim() === '' ? getSmartLogoUrl(projForm.url) : projForm.imgUrl;
                if (editingProjId) {
                    setData(prev => ({ ...prev, projects: prev.projects.map(p => p.id === editingProjId ? { ...p, name: { ar: projForm.nameAr, en: projForm.nameEn || projForm.nameAr }, url: projForm.url, imgUrl: finalImgUrl, shortDesc: { ar: projForm.shortAr, en: projForm.shortEn || projForm.shortAr }, longDesc: { ar: projForm.longAr, en: projForm.longEn }, embedUrl: projForm.embedUrl } : p) }));
                    setEditingProjId(null);
                } else {
                    const newEntry = { id: Date.now(), name: { ar: projForm.nameAr, en: projForm.nameEn || projForm.nameAr }, url: projForm.url, imgUrl: finalImgUrl, shortDesc: { ar: projForm.shortAr, en: projForm.shortEn || projForm.shortAr }, longDesc: { ar: projForm.longAr, en: projForm.longEn }, embedUrl: projForm.embedUrl };
                    setData(prev => ({ ...prev, projects: [newEntry, ...prev.projects] }));
                }
                setProjForm({ nameAr: '', nameEn: '', url: '', imgUrl: '', shortAr: '', shortEn: '', longAr: '', longEn: '', embedUrl: '' });
            };

            const handleEditProject = (item) => { setProjForm({ nameAr: item.name.ar, nameEn: item.name.en, url: item.url, imgUrl: item.imgUrl || '', shortAr: item.shortDesc.ar, shortEn: item.shortDesc.en, longAr: item.longDesc.ar, longEn: item.longDesc.en, embedUrl: item.embedUrl || '' }); setEditingProjId(item.id); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            const handleDelete = (id, type) => { if(window.confirm(t('confirmDelete'))) { if (type === 'news') { setData(prev => ({ ...prev, news: prev.news.filter(n => n.id !== id) })); if(editingNewsId === id) setEditingNewsId(null); } else { setData(prev => ({ ...prev, projects: prev.projects.filter(p => p.id !== id) })); if(editingProjId === id) setEditingProjId(null); } } };
            const handleCancelEdit = () => { if (activeAdminTab === 'news') { setEditingNewsId(null); setNewsForm({ textAr: '', textEn: '', embedUrl: '' }); } else { setEditingProjId(null); setProjForm({ nameAr: '', nameEn: '', url: '', imgUrl: '', shortAr: '', shortEn: '', longAr: '', longEn: '', embedUrl: '' }); } };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setProjForm({ ...projForm, imgUrl: reader.result });
                };
                reader.readAsDataURL(file);
            };

            // 4. تعديل دالة سحب الكود لتوليد كود JavaScript جاهز
            const handleExport = () => {
                const jsonStr = `var initialData = ${JSON.stringify(data, null, 2)};`;
                navigator.clipboard.writeText(jsonStr).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
            };

            const isEditing = activeAdminTab === 'news' ? editingNewsId !== null : editingProjId !== null;
            return (
                <div className="glass-card rounded-3xl p-6 md:p-10 animate-fade-in mt-4">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-slate-200 dark:border-slate-700 pb-6">
                        <h2 className="text-3xl font-bold flex items-center mb-4 md:mb-0 text-slate-900 dark:text-white"><Icon name="Lock" className="me-3 text-gold" size={32} /> {t('adminDashboard')}</h2>
                        <div className="flex space-x-3 rtl:space-x-reverse">
                            <button onClick={handleExport} className="flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-bold shadow-md">{copied ? <Icon name="CheckCircle" size={18} className="me-2" /> : <Icon name="FileJson" size={18} className="me-2" />}{copied ? t('copied') : t('exportData')}</button>
                            <button onClick={onLogout} className="flex items-center px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors font-bold shadow-md"><Icon name="X" size={18} className="me-2" /> {t('logout')}</button>
                        </div>
                    </div>
                    <div className="flex space-x-4 rtl:space-x-reverse mb-8 border-b border-slate-200 dark:border-slate-700 pb-4">
                        <button onClick={() => {setActiveAdminTab('news'); handleCancelEdit();}} className={`px-6 py-2 rounded-full font-bold transition-all shadow-sm ${activeAdminTab === 'news' ? 'bg-gold text-white scale-105' : 'bg-slate-200 text-slate-800 dark:bg-slate-800 dark:text-slate-200'}`}>{t('addNews')}</button>
                        <button onClick={() => {setActiveAdminTab('projects'); handleCancelEdit();}} className={`px-6 py-2 rounded-full font-bold transition-all shadow-sm ${activeAdminTab === 'projects' ? 'bg-gold text-white scale-105' : 'bg-slate-200 text-slate-800 dark:bg-slate-800 dark:text-slate-200'}`}>{t('addProject')}</button>
                    </div>
                    <div className={`p-6 md:p-8 rounded-2xl mb-10 border shadow-inner transition-colors duration-300 ${isEditing ? 'bg-amber-50/50 dark:bg-amber-900/10 border-gold/50' : 'bg-white/50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700'}`}>
                        {activeAdminTab === 'news' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <textarea placeholder={t('adminNewsTextAr')} value={newsForm.textAr} onChange={(e) => setNewsForm({...newsForm, textAr: e.target.value})} className="col-span-1 md:col-span-2 w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none h-24" />
                                <textarea placeholder={t('adminNewsTextEn')} value={newsForm.textEn} onChange={(e) => setNewsForm({...newsForm, textEn: e.target.value})} className="col-span-1 md:col-span-2 w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none h-24" />
                                <input type="text" placeholder={t('adminLinkInfo')} value={newsForm.embedUrl} onChange={(e) => setNewsForm({...newsForm, embedUrl: e.target.value})} className="col-span-1 md:col-span-2 w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none" />
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <input type="text" placeholder={t('adminProjNameAr')} value={projForm.nameAr} onChange={(e) => setProjForm({...projForm, nameAr: e.target.value})} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none" /><input type="text" placeholder={t('adminProjNameEn')} value={projForm.nameEn} onChange={(e) => setProjForm({...projForm, nameEn: e.target.value})} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none" /><input type="text" placeholder={t('adminProjUrl')} value={projForm.url} onChange={(e) => setProjForm({...projForm, url: e.target.value})} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none" /><div className="w-full flex space-x-2 rtl:space-x-reverse"><input type="text" placeholder={`${t('adminProjImg')} - ${lang === 'ar' ? '(التوليد الذكي مفعّل - يمكنك تركه فارغاً)' : '(AI Enabled - Leave empty)'}`} value={projForm.imgUrl} onChange={(e) => setProjForm({...projForm, imgUrl: e.target.value})} className="flex-grow bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none" /><label className="cursor-pointer flex items-center justify-center bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-800 dark:text-slate-200 px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 transition-colors flex-shrink-0"><Icon name="Plus" size={20} className="me-1" /><span className="font-bold text-sm">{lang === 'ar' ? 'رفع' : 'Upload'}</span><input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload} /></label></div><textarea placeholder={t('adminProjShortAr')} value={projForm.shortAr} onChange={(e) => setProjForm({...projForm, shortAr: e.target.value})} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none h-24" /><textarea placeholder={t('adminProjShortEn')} value={projForm.shortEn} onChange={(e) => setProjForm({...projForm, shortEn: e.target.value})} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none h-24" /><textarea placeholder={t('adminProjLongAr')} value={projForm.longAr} onChange={(e) => setProjForm({...projForm, longAr: e.target.value})} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none h-24" /><textarea placeholder={t('adminProjLongEn')} value={projForm.longEn} onChange={(e) => setProjForm({...projForm, longEn: e.target.value})} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none h-24" /><input type="text" placeholder={t('adminProjEmbed')} value={projForm.embedUrl} onChange={(e) => setProjForm({...projForm, embedUrl: e.target.value})} className="col-span-1 md:col-span-2 w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 focus:border-gold outline-none" />
                            </div>
                        )}
                        <div className="flex space-x-3 rtl:space-x-reverse">
                            <button onClick={activeAdminTab === 'news' ? handleSaveNews : handleSaveProject} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg flex items-center transition-all shadow-md transform hover:-translate-y-1"><Icon name={isEditing ? 'Edit' : 'Plus'} size={20} className="me-2" /> {isEditing ? t('update') : t('save')}</button>
                            {isEditing && <button onClick={handleCancelEdit} className="bg-slate-400 hover:bg-slate-500 text-white font-bold py-3 px-8 rounded-lg flex items-center transition-all shadow-md transform hover:-translate-y-1"><Icon name="X" size={20} className="me-2" /> {t('cancel')}</button>}
                        </div>
                    </div>
                    <div className="space-y-4">
                        {(activeAdminTab === 'news' ? data.news : data.projects).map(item => (
                            <div key={item.id} className="flex justify-between items-center p-4 bg-white/70 dark:bg-slate-800/70 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-shadow">
                                <div className="font-bold truncate max-w-[60%] text-slate-900 dark:text-white">{activeAdminTab === 'news' ? item.text[lang] : item.name[lang]}</div>
                                <div className="flex space-x-2 rtl:space-x-reverse">
                                    <button onClick={() => activeAdminTab === 'news' ? handleEditNews(item) : handleEditProject(item)} className="p-2 text-blue-500 hover:bg-blue-500 hover:text-white rounded-lg transition-colors border border-blue-500/30"><Icon name="Edit" size={20} /></button>
                                    <button onClick={() => handleDelete(item.id, activeAdminTab)} className="p-2 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition-colors border border-red-500/30"><Icon name="Trash" size={20} /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
